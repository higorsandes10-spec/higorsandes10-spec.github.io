<!DOCTYPE html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>Cadastro de Usuário - Cap. 5 / Atv. 2</title>
</head>
<body>
  
  <h1>Cadastro de Usuário</h1>
  
  <form action="https://httpbin.org/get" method="GET">
    
    <p>preencha as informções abaixo!</p>
    
      <label for="nome">Nome Completo:</label>
        <input type="text" name="nome" required, minlength="3">
        <br><br>
    
      <label for="email">Endereço de E-mail:</label>
        <input type="email" name=""="email" required>
        <br><br>
    
      <label for="senha">Senha:</label>
        <input type="password" name="senha" required, minlength="8">
        <br><br>
    
      <label for="nascimento">Data de nascimento:</label>
        <input type="date" name="nascimento" required, minlength="8">
        <br><br>
    
      <fieldset>
            <legend>Gênero</legend>

            <input type="radio" id="masculino" name="genero" value="masculino">
            <label for="masculino">Masculino</label>
            <br>

            <input type="radio" id="feminino" name="genero" value="feminino">
            <label for="feminino">Feminino</label>
            <br>

            <input type="radio" id="outro" name="genero" value="outro">
            <label for="outro">Outro</label>
            <br>

            <input type="radio" id="prefiro_nao_informar" name="genero" value="prefiro_nao_informar">
            <label for="prefiro_nao_informar">Prefiro não informar</label>
      </fieldset>
    
    <button type="submit">Criar conta</button>
    <button type="reset">Limpar formulário</button>
    
  </form>
 
 
  <nav>
    <a href="index.html">Clique para voltar</a>
  </nav>
</body>
</html>
