<!DOCTYPE html>

<html lang="pt br">
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>Formulário de Inscrição com campos avançado</title>
</head>
<body>
  <h1>
    Semana de Tecnologias IFAL
  </h1>
  <p>preencha o formulário abaixo para realizar sua inscrição</p>
  <form action="https://httpbin.org/post" method="post">
    <fieldset>
      <legend>Idebtificação do Participante</legend>
      
       <label for="nome">Nome Completo: </label>
      <input type="text" id="nome" name="nome" required>
      <br> <br>
      
       <label for="email">E-mail: </label>
      <input type="email" id="email" name="email" required>
      <br> <br>
      
             <label for="cidade">Cidade de Origem: </label>
      <input type="text" id="cidade" name="cidade" list="cidades">
      <datalist id="cidades">
        <option value="Maceió"></option>
        <option value="Arapiraca"></option>
        <option value="Palmeira dos Índios"></option>
        <option value="Rio Largo"></option>
        <option value="União dos Palmares"></option>
        <option value="Panedo"></option>
        <option value="Delmiro Gouveia"></option>
        <option value="São Miguel dos Campos"></option>
      </datalist>
      <br> <br>
      
      <label for="foto">
        Foto de crachá:
      </label>
                    <input
                        type="file"
                        id="foto"
                        name="foto"
                        accept="image/jpeg,image/png"
                        aria-describedby="ajuda-foto">

                    <small id="ajuda-foto">
                        Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.
                    </small>

                </p>

            </fieldset>

            <fieldset>

                <legend>Preferências para o evento</legend>

                <p>

                    <label for="chegada">
                        Data e hora preferida para chegada
                    </label>

                    <input
                        type="datetime-local"
                        id="chegada"
                        name="chegada">

                </p>

                <p>

                    <label for="experiencia">
                        Nível de experiência:
                        <span id="valor-experiencia">
                            5
                        </span>/10
                    </label>

                    <input
                        type="range"
                        id="experiencia"
                        name="experiencia"
                        min="0"
                        max="10"
                        step="1"
                        value="5"
                        oninput="document.getElementById('valor-experiencia').textContent = this.value">

                </p>

                <p>

                    <label for="cor_camiseta">
                        Cor de preferência para a camiseta
                    </label>

                    <input
                        type="color"
                        id="cor_camiseta"
                        name="cor_camiseta"
                        value="#1a73e8">

                </p>

                <p>

                    <label for="oficinas">
                        Oficinas de interesse
                    </label>

                    <select
                        id="oficinas"
                        name="oficinas[]"
                        multiple
                        size="4"
                        aria-describedby="ajuda-oficinas">

                        <option>
                            Desenvolvimento Web
                        </option>

                        <option>
                            Banco de Dados
                        </option>

                        <option>
                            Inteligência Artificial
                        </option>

                        <option>
                            Segurança da Informação
                        </option>

                        <option>
                            Infraestrutura
                        </option>

                    </select>

                    <small id="ajuda-oficinas">
                        Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.
                    </small>

                </p>

            </fieldset>

            <input
                type="hidden"
                name="edicao"
                value="2026">

            <button type="submit">
                Confirmar inscrição
            </button>

        </form>
    </fieldset>
  </form>
    <nav>
    <a href="index.html">Clique para voltar</a>
  </nav>
</body>
</html>
